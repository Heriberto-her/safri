<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFRI PRO 🔥</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splashContent">
    <img src="Logo.png" class="logoBig">
    <h1>SAFRI</h1>
    <p>Cargando sistema...</p>
    <div class="loader"></div>
  </div>
</div>

<!-- LOGIN -->
<div class="welcome" id="loginBox" style="display:none;">
  <div class="logoBox">
    <img src="Logo.png" class="logo">
    <h2>Bienvenido</h2>
  </div>

  <div class="card">
    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
    <button class="sec" onclick="mostrarRegistro()">Crear cuenta</button>
  </div>
</div>

<!-- REGISTRO -->
<div class="container" id="registroBox" style="display:none">
<div class="card">
<h2>Crear cuenta</h2>
<input id="nombre" placeholder="Nombre">
<input id="emailR" placeholder="Correo">
<input id="passR" type="password" placeholder="Contraseña">

<select id="tipoUser">
<option value="vendedor">Vendedor</option>
<option value="admin">Socio</option>
</select>

<button onclick="registrar()">Crear cuenta</button>
<button onclick="volverLogin()">Volver</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="simpleMenu" style="display:none">
<button class="bigBtn" onclick="ver('stats')">💰 Ver ganancias</button>
<button class="logoutBtn" onclick="logout()">Salir</button>
</div>

<!-- STATS -->
<div class="container" id="stats" style="display:none">
<div class="card">
<h2>Mis ganancias</h2>
<pre id="statsContent"></pre>
</div>
</div>

<script>

// 🔊 VOZ
function hablar(texto){
let msg = new SpeechSynthesisUtterance(texto);
msg.lang = "es-MX";
speechSynthesis.speak(msg);
}

// SPLASH
window.addEventListener("load", function(){
setTimeout(function(){
 document.getElementById("splash").style.display = "none";
 document.getElementById("loginBox").style.display = "flex";
 hablar("Bienvenido a Safri");
}, 2000);
});

// SERVICE WORKER
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}

// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
 authDomain: "safriapp-2f1db.firebaseapp.com",
 projectId: "safriapp-2f1db"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let usuarioNombre="";

// LOGIN
function login(){
let email = document.getElementById('email').value;
let pass = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email, pass)
.then(res=>{
 cargarDatos(res.user.uid);
})
.catch(err=>alert(err.message));
}

// REGISTRO
function registrar(){
let nombre = document.getElementById('nombre').value;
let email = document.getElementById('emailR').value;
let pass = document.getElementById('passR').value;
let tipo = document.getElementById('tipoUser').value;

auth.createUserWithEmailAndPassword(email, pass)
.then(res=>{
 db.collection("usuarios").doc(res.user.uid).set({
   nombre:nombre,
   tipo:tipo
 });

 alert("Cuenta creada 🔥");
 volverLogin();
});
}

// CARGAR
function cargarDatos(uid){
db.collection("usuarios").doc(uid).get().then(doc=>{
 let data = doc.data();
 usuarioNombre = data.nombre;

 document.getElementById('loginBox').style.display="none";
 document.getElementById('menu').style.display="flex";

 hablar("Hola " + usuarioNombre);

 ver('stats');
});
}

// STATS
function ver(v){
document.getElementById('stats').style.display="block";
cargarStats();
}

function cargarStats(){
db.collection("fichas").get().then(snap=>{

 let total=0;

 snap.forEach(doc=>{
  let v = doc.data();
  if(v.vendedor===usuarioNombre){
   total+=v.precio;
  }
 });

 let ganancia = total * 0.15;

 document.getElementById('statsContent').textContent =
 "Total: $" + total +
 "\nTu 15%: $" + ganancia.toFixed(2);

});
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// VISTAS
function mostrarRegistro(){
document.getElementById('loginBox').style.display="none";
document.getElementById('registroBox').style.display="block";
}

function volverLogin(){
document.getElementById('loginBox').style.display="flex";
document.getElementById('registroBox').style.display="none";
}

</script>

</body>
</html>
