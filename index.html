<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFRI 🔥</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<!-- BIENVENIDA -->
<div class="welcome" id="loginBox">

<div class="logoBox">
<img src="logo.png" class="logo">
<h1>SAFRI</h1>
<p>Internet rápido y confiable 🔥</p>
</div>

<div class="card loginCard">
<h2>Bienvenido</h2>

<input id="email" placeholder="Escribe tu correo">
<input id="password" type="password" placeholder="Tu contraseña">

<button onclick="login()">Entrar</button>
<button class="sec" onclick="mostrarRegistro()">Crear cuenta</button>

</div>

</div>

<!-- REGISTRO -->
<div class="container" id="registroBox" style="display:none">
<div class="card">
<h2>Crear cuenta</h2>
<input id="nombre" placeholder="Tu nombre">
<input id="emailR" placeholder="Correo">
<input id="passR" type="password" placeholder="Contraseña">

<select id="tipoUser">
<option value="vendedor">Vendedor</option>
<option value="admin">Socio</option>
</select>

<button onclick="registrar()">Crear cuenta</button>
<button onclick="volverLogin()">Volver</button>
</div>
</div>

<!-- MENU SIMPLE -->
<div id="menu" class="simpleMenu" style="display:none">

<button class="bigBtn" onclick="ver('scan')">📸 Escanear fichas</button>

<button class="bigBtn" onclick="ver('stats')">💰 Ver ganancias</button>

<button class="logoutBtn" onclick="logout()">🚪 Salir</button>

</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard" style="display:none">
<div class="card center">
<h2 id="saludo">Bienvenido</h2>
<p>Selecciona una opción 👇</p>
</div>
</div>

<!-- SCAN -->
<div class="container" id="scan" style="display:none">
<div class="card">
<h2>Escanear fichas</h2>

<input type="file" id="img">

<select id="vendedorSelect"></select>

<select id="precio">
<option value="10">$10</option>
<option value="25">$25</option>
</select>

<button onclick="scan()">Escanear</button>

<textarea id="pins"></textarea>

<button onclick="generarScript()">Generar Script MikroTik</button>
<pre id="script"></pre>

<button onclick="guardar()">Guardar fichas</button>

</div>
</div>

<!-- STATS -->
<div class="container" id="stats" style="display:none">
<div class="card">
<h2>Mis ganancias</h2>
<pre id="statsContent"></pre>
</div>
</div>

<script>

// VOZ
function hablar(texto){
let msg = new SpeechSynthesisUtterance(texto);
msg.lang = "es-MX";
speechSynthesis.speak(msg);
}

// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
 authDomain: "safriapp-2f1db.firebaseapp.com",
 projectId: "safriapp-2f1db"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let usuarioNombre="";
let tipoActual="";

// LOGIN
function login(){
let email = document.getElementById('email').value;
let pass = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email, pass)
.then(res=>{
 cargarDatos(res.user.uid);
})
.catch(err=>alert(err.message));
}

// REGISTRO
function registrar(){
let nombre = document.getElementById('nombre').value;
let email = document.getElementById('emailR').value;
let pass = document.getElementById('passR').value;
let tipo = document.getElementById('tipoUser').value;

auth.createUserWithEmailAndPassword(email, pass)
.then(res=>{
 db.collection("usuarios").doc(res.user.uid).set({
   nombre:nombre,
   tipo:tipo
 });

 alert("Cuenta creada 🔥");
 volverLogin();
});
}

// CARGAR USUARIO
function cargarDatos(uid){
db.collection("usuarios").doc(uid).get().then(doc=>{
 let data = doc.data();

 usuarioNombre = data.nombre;
 tipoActual = data.tipo;

 document.getElementById('loginBox').style.display="none";
 document.getElementById('menu').style.display="flex";

 document.getElementById('saludo').textContent = "Hola " + usuarioNombre;

 hablar("Hola " + usuarioNombre + ", bienvenido a Safri");

 cargarVendedores();
 ver('dashboard');
});
}

// NAVEGACIÓN
function ver(v){
["dashboard","scan","stats"].forEach(id=>{
 document.getElementById(id).style.display="none";
});
document.getElementById(v).style.display="block";

if(v==="stats") cargarStats();
}

// VENDEDORES
function cargarVendedores(){
db.collection("usuarios").where("tipo","==","vendedor").get().then(snap=>{
 let sel = document.getElementById('vendedorSelect');
 sel.innerHTML="";

 snap.forEach(doc=>{
  let v = doc.data();
  let op = document.createElement('option');
  op.value = v.nombre;
  op.text = v.nombre;
  sel.appendChild(op);
 });

});
}

// OCR
function scan(){
let file = document.getElementById('img').files[0];
if(!file) return alert("Sube imagen");

Tesseract.recognize(file,'eng').then(({data:{text}})=>{
 document.getElementById('pins').value = text;
});
}

// SCRIPT
function generarScript(){
let pins = document.getElementById('pins').value.split('\n');
let script="";

pins.forEach(p=>{
 p=p.trim();
 if(p!=""){
  script+=`/ip hotspot user add name=${p} password="" profile=default\n`;
 }
});

document.getElementById('script').textContent = script;
}

// GUARDAR
function guardar(){
let pins = document.getElementById('pins').value.split('\n');
let vendedor = document.getElementById('vendedorSelect').value || usuarioNombre;
let precio = parseInt(document.getElementById('precio').value);

pins.forEach(p=>{
 p=p.trim();
 if(p!=""){
  db.collection("fichas").add({
   pin:p,
   vendedor:vendedor,
   precio:precio,
   fecha:new Date()
  });
 }
});

hablar("Fichas guardadas correctamente");
alert("Guardado 🔥");
}

// STATS CON CORTE
function cargarStats(){

let hoy = new Date();
let inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 20);
let fin = new Date(hoy.getFullYear(), hoy.getMonth()+1, 20);

db.collection("fichas").get().then(snap=>{

 let total=0;

 snap.forEach(doc=>{
  let v = doc.data();
  let fecha = v.fecha.toDate();

  if(fecha>=inicio && fecha<fin){
   if(v.vendedor===usuarioNombre){
    total+=v.precio;
   }
  }
 });

 let ganancia = total * 0.15;

 document.getElementById('statsContent').textContent =
 "Total vendido: $" + total +
 "\nTu ganancia (15%): $" + ganancia.toFixed(2);

});
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// VISTAS
function mostrarRegistro(){
document.getElementById('loginBox').style.display="none";
document.getElementById('registroBox').style.display="block";
}

function volverLogin(){
document.getElementById('loginBox').style.display="flex";
document.getElementById('registroBox').style.display="none";
}

</script>

</body>
</html>
