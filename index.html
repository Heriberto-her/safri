<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFRI PRO 🔥</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img src="logo.png" class="logoSplash">
<h1>SAFRI PRO 🔥</h1>
</div>

<!-- LOGIN -->
<div class="welcome" id="loginBox">
<div class="logoBox">
<img src="logo.png" class="logo">
<h1>SAFRI</h1>
<p>Internet rápido y confiable 🔥</p>
</div>

<div class="card">
<h2>Bienvenido</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button class="sec" onclick="mostrarRegistro()">Crear cuenta</button>
</div>
</div>

<!-- REGISTRO -->
<div class="container" id="registroBox" style="display:none">
<div class="card">
<h2>Crear cuenta</h2>
<input id="nombre" placeholder="Nombre">
<input id="emailR" placeholder="Correo">
<input id="passR" type="password" placeholder="Contraseña">

<select id="tipoUser">
<option value="vendedor">Vendedor</option>
<option value="admin">Socio</option>
</select>

<button onclick="registrar()">Crear cuenta</button>
<button onclick="volverLogin()">Volver</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="simpleMenu" style="display:none">
<button class="bigBtn" onclick="ver('scan')" id="btnScan">📸 Escanear fichas</button>
<button class="bigBtn" onclick="ver('stats')">💰 Mis ganancias</button>
<button class="bigBtn" onclick="ver('adminStats')" id="btnAdmin">📊 Estadísticas</button>
<button class="bigBtn" onclick="ver('chat')">💬 Chat</button>
<button class="logoutBtn" onclick="logout()">🚪 Salir</button>
</div>

<!-- SCAN -->
<div class="container" id="scan" style="display:none">
<div class="card">
<h2>Escanear fichas</h2>

<input type="file" id="img">

<select id="vendedorSelect"></select>

<select id="precio">
<option value="10">$10</option>
<option value="25">$25</option>
</select>

<button onclick="scan()">Escanear</button>

<textarea id="pins"></textarea>

<button onclick="generarScript()">Generar Script</button>
<pre id="script"></pre>

<button onclick="guardar()">Guardar fichas</button>
</div>
</div>

<!-- STATS -->
<div class="container" id="stats" style="display:none">
<div class="card">
<h2>Mis ganancias</h2>
<pre id="statsContent"></pre>
</div>
</div>

<!-- ADMIN -->
<div class="container" id="adminStats" style="display:none">
<div class="card">
<h2>Estadísticas generales</h2>
<pre id="adminContent"></pre>
</div>
</div>

<!-- CHAT -->
<div class="container" id="chat" style="display:none">
<div class="card">
<h2>Chat</h2>

<div id="chatBox" class="chatBox"></div>

<input id="msg" placeholder="Mensaje">
<button onclick="enviar()">Enviar</button>

</div>
</div>

<script>

// SPLASH
setTimeout(()=>{
 document.getElementById("splash").style.display="none";
},2000);

// FIREBASE
const firebaseConfig = {
 apiKey: "AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
 authDomain: "safriapp-2f1db.firebaseapp.com",
 projectId: "safriapp-2f1db"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let usuarioNombre="";
let tipoActual="";

// LOGIN (CORREGIDO)
function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, pass)
.then(res=>{
 cargarDatos(res.user.uid);
})
.catch(err=>alert(err.message));
}

// REGISTRO (CORREGIDO)
function registrar(){

let nombre = document.getElementById("nombre").value;
let email = document.getElementById("emailR").value;
let pass = document.getElementById("passR").value;
let tipo = document.getElementById("tipoUser").value;

auth.createUserWithEmailAndPassword(email, pass)
.then(res=>{

 db.collection("usuarios").doc(res.user.uid).set({
  nombre:nombre,
  tipo:tipo
 });

 alert("Cuenta creada 🔥");
 volverLogin();

})
.catch(err=>alert(err.message));
}

// CARGAR USUARIO (SEGURO)
function cargarDatos(uid){

db.collection("usuarios").doc(uid).get().then(doc=>{

 if(!doc.exists){
  alert("Usuario no registrado en base de datos");
  return;
 }

 let d = doc.data();

 usuarioNombre = d.nombre;
 tipoActual = d.tipo;

 document.getElementById("loginBox").style.display="none";
 document.getElementById("menu").style.display="flex";

 if(tipoActual !== "admin"){
  document.getElementById("btnScan").style.display="none";
  document.getElementById("btnAdmin").style.display="none";
 }

 cargarVendedores();

});

}

// NAV
function ver(v){
["scan","stats","adminStats","chat"].forEach(id=>{
 document.getElementById(id).style.display="none";
});

document.getElementById(v).style.display="block";

if(v==="stats") cargarStats();
if(v==="adminStats") cargarAdminStats();
}

// VENDEDORES
function cargarVendedores(){
db.collection("usuarios").where("tipo","==","vendedor").get().then(snap=>{

 let sel = document.getElementById("vendedorSelect");
 sel.innerHTML="";

 snap.forEach(doc=>{
  let op = document.createElement("option");
  op.text = doc.data().nombre;
  sel.add(op);
 });

});
}

// OCR
function scan(){
let file = document.getElementById("img").files[0];
if(!file) return alert("Sube imagen");

Tesseract.recognize(file,'eng').then(({data:{text}})=>{
 document.getElementById("pins").value = text;
});
}

// SCRIPT
function generarScript(){
let pins = document.getElementById("pins").value.split("\n");
let script="";

pins.forEach(p=>{
 p=p.trim();
 if(p!=""){
  script+=`/ip hotspot user add name=${p}\n`;
 }
});

document.getElementById("script").textContent = script;
}

// GUARDAR
function guardar(){
let pins = document.getElementById("pins").value.split("\n");

pins.forEach(p=>{
 p=p.trim();
 if(p!=""){
  db.collection("fichas").add({
   pin:p,
   vendedor:document.getElementById("vendedorSelect").value,
   precio:parseInt(document.getElementById("precio").value),
   fecha:new Date()
  });
 }
});

alert("Guardado 🔥");
}

// STATS
function cargarStats(){
db.collection("fichas").get().then(snap=>{
 let total=0;

 snap.forEach(doc=>{
  let v = doc.data();
  if(v.vendedor === usuarioNombre){
   total += v.precio;
  }
 });

 document.getElementById("statsContent").textContent =
 "Total: $" + total +
 "\nGanancia: $" + (total*0.15).toFixed(2);
});
}

// ADMIN
function cargarAdminStats(){
db.collection("fichas").get().then(snap=>{

 let total=0;
 let vendedores={};

 snap.forEach(doc=>{
  let v = doc.data();

  total += v.precio;

  vendedores[v.vendedor] = (vendedores[v.vendedor]||0) + v.precio;
 });

 let txt="TOTAL: $" + total + "\n\n";

 for(let v in vendedores){
  txt += v + ": $" + vendedores[v] + "\n";
 }

 document.getElementById("adminContent").textContent = txt;

});
}

// CHAT
function enviar(){
let texto = document.getElementById("msg").value;

db.collection("chat").add({
 nombre:usuarioNombre,
 mensaje:texto,
 fecha:new Date()
});

document.getElementById("msg").value="";
}

db.collection("chat").orderBy("fecha")
.onSnapshot(snap=>{
 let html="";
 snap.forEach(doc=>{
  let d = doc.data();
  html += `<div><b>${d.nombre}:</b> ${d.mensaje}</div>`;
 });
 document.getElementById("chatBox").innerHTML = html;
});

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// VISTAS
function mostrarRegistro(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registroBox").style.display="block";
}

function volverLogin(){
document.getElementById("loginBox").style.display="flex";
document.getElementById("registroBox").style.display="none";
}

</script>

</body>
</html>
