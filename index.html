<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFRI PRO 🔥</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <img src="logo.png" class="logoBig">
  <h1>SAFRI</h1>
  <p>Cargando...</p>
</div>

<!-- LOGIN -->
<div class="welcome">

  <div id="loginBox" class="card">

    <img src="logo.png" class="logoLogin">

    <h2>Iniciar sesión</h2>

    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
    <button class="sec" onclick="mostrarRegistro()">Crear cuenta</button>

  </div>

  <!-- REGISTRO -->
  <div id="registroBox" class="card" style="display:none;">

    <img src="logo.png" class="logoLogin">

    <h2>Registro</h2>

    <input id="nombre" placeholder="Nombre">
    <input id="emailR" placeholder="Correo">
    <input id="passR" type="password">

    <select id="tipoUser">
      <option value="vendedor">Vendedor</option>
      <option value="admin">Socio</option>
    </select>

    <button onclick="registrar()">Crear</button>
    <button class="sec" onclick="volverLogin()">Volver</button>

  </div>

</div>

<!-- MENU CENTRADO -->
<div id="menu" class="menu" style="display:none;">

  <div class="menuCard">

    <button class="bigBtn" onclick="ver('stats')">💰 Ganancias</button>

    <button class="bigBtn" id="btnScan" onclick="ver('scan')">📸 Escanear Fichas</button>

    <button class="bigBtn" id="btnPanel" onclick="ver('panel')">👥 Vendedores</button>

    <button class="logoutBtn" onclick="logout()">🚪 Salir</button>

  </div>

</div>

<!-- SCAN -->
<div id="scan" style="display:none">

  <div class="card">

    <h2>📸 Scanner Fichas</h2>

    <input type="file" id="img">

    <select id="vendedorSelect"></select>

    <select id="precio">
      <option value="10">$10</option>
      <option value="25">$25</option>
    </select>

    <button onclick="scan()">Escanear</button>

    <textarea id="pins" placeholder="Fichas detectadas..."></textarea>

    <button onclick="guardar()">Guardar Fichas</button>

  </div>

</div>

<!-- STATS -->
<div id="stats" style="display:none">
<h2>Mis ganancias</h2>
<pre id="statsContent"></pre>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">
<h2>Panel vendedores</h2>
<ul id="listaVendedores"></ul>
<ol id="ranking"></ol>
</div>

<script>

// SPLASH
window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none";
},2000);
};

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBAx5v07KT6gNgK1k04VEPGiJ_hsoIcX2w",
authDomain:"safriapp-2f1db.firebaseapp.com",
projectId:"safriapp-2f1db"
});

const auth=firebase.auth();
const db=firebase.firestore();

let nombre="";

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(res=>cargar(res.user.uid));
}

// REGISTRO
function registrar(){
auth.createUserWithEmailAndPassword(emailR.value,passR.value)
.then(res=>{
db.collection("usuarios").doc(res.user.uid).set({
nombre:nombre.value,
tipo:tipoUser.value
});
alert("Creado");
volverLogin();
});
}

// CARGAR
function cargar(uid){
db.collection("usuarios").doc(uid).get().then(doc=>{
let d=doc.data();
nombre=d.nombre;

document.getElementById("loginBox").style.display="none";
document.getElementById("registroBox").style.display="none";
document.getElementById("menu").style.display="flex";

if(d.tipo==="vendedor"){
document.getElementById("btnScan").style.display="none";
document.getElementById("btnPanel").style.display="none";
}
});
}

// VISTAS
function ver(v){
["scan","stats","panel"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(v).style.display="block";
}

// STATS
function stats(){
db.collection("fichas").get().then(snap=>{
let total=0;
snap.forEach(d=>{
let v=d.data();
if(v.vendedor===nombre) total+=v.precio;
});
statsContent.textContent="Total: $"+total;
});
}

// PANEL
function panel(){
db.collection("fichas").get().then(snap=>{
let ventas={};

snap.forEach(d=>{
let v=d.data();
ventas[v.vendedor]=(ventas[v.vendedor]||0)+v.precio;
});

listaVendedores.innerHTML="";
ranking.innerHTML="";

Object.entries(ventas).forEach(([k,v])=>{
let li=document.createElement("li");
li.textContent=k+" - $"+v;
listaVendedores.appendChild(li);
});

Object.entries(ventas).sort((a,b)=>b[1]-a[1]).forEach(r=>{
let li=document.createElement("li");
li.textContent=r[0]+" - $"+r[1];
ranking.appendChild(li);
});

});
}

// SCAN
function scan(){
let f=img.files[0];
Tesseract.recognize(f,'eng').then(r=>{
pins.value=r.data.text;
});
}

// GUARDAR
function guardar(){
let arr=pins.value.split("\n");
arr.forEach(p=>{
if(p.trim()!=""){
db.collection("fichas").add({
pin:p,
vendedor:vendedorSelect.value,
precio:parseInt(precio.value)
});
}
});
alert("Guardado");
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// UI
function mostrarRegistro(){
loginBox.style.display="none";
registroBox.style.display="flex";
}
function volverLogin(){
loginBox.style.display="flex";
registroBox.style.display="none";
}

</script>

</body>
</html>
